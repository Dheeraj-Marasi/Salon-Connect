kind = "web"
previewPath = "/"
title = "Hyderabad Beauty Salon Marketplace"
version = "1.0.0"
id = "artifacts/salon-marketplace"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23717

[services.development]
run = "pnpm --filter @workspace/salon-marketplace run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/salon-marketplace", "run", "build" ]
publicDir = "artifacts/salon-marketplace/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23717"
BASE_PATH = "/"
